<h2 mat-dialog-title>{{esEdicion ? 'MODIFICAR' : 'AGREGAR'}} PROFESION
    <h5 class="requiredField">*Campos Obligatorios</h5>
  </h2>
  <form [formGroup]="formVal!" (ngSubmit)="guardarProfesion()" novalidate   >
    <mat-dialog-content>

      <div class="row" style="margin-top: 20px">
        <div class="col">
            <mat-label>Categoría*</mat-label>
            <mat-radio-group matInput formControlName="asistencial" name="asistencial" id="asistencial">
              <mat-radio-button [value]="true" color="primary">Si</mat-radio-button>
              <mat-radio-button [value]="false" color="primary">No</mat-radio-button>
            </mat-radio-group>

            <mat-error *ngIf="formVal?.get('asistencial')?.invalid &&
            formVal?.get('asistencial')?.touched">
              La categ es obligatoria
            </mat-error>
        </div>
      </div>
  
      <div class="row" style="margin-top: 20px">
        <div class="col">
          <mat-form-field appearance="fill">
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="nombre"  placeholder="Ingresar nombre de la Profesión" autocomplete="off" id="nombre"/>
            <mat-error *ngIf="formVal?.get('nombre')?.invalid &&
            formVal?.get('nombre')?.touched">
              El nombre es obligatorio
            </mat-error>
            <mat-error *ngIf="formVal?.get('nombre')?.hasError('pattern')">
              El nombre debe tener solo letras y entre 2 y 50 caracteres
            </mat-error>

          </mat-form-field>
        </div>
      </div>
    </mat-dialog-content>
    <div mat-dialog-actions class="action mt-4">
      <button mat-raised-button class="btnCancel" type="button" mat-button (click)="cancel()">Cancelar
      </button>
      <button mat-raised-button color="primary" [disabled]="formVal?.invalid">{{esEdicion ? 'Modificar' : 'Guardar'}}</button>
    </div>
  </form>
