<table class="table">
    <thead>
      <tr>
        <th scope="col">Id</th>
        <th scope="col">Nombre</th>
        <th scope="col">Apellido</th>
        <th scope="col">Dni</th>
        <th scope="col"> </th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let profesional of profesionales">
        <td>{{profesional.idPersona}}</td>
        <td>{{profesional.nombre}}</td>
        <td>{{profesional.apellido}}</td>
        <td>{{profesional.dni}}</td>
        <td><button class="btn btn-outline-warning" routerLink="/formRegDiario/{{profesional.idPersona}}"><i class="far fa-edit"></i> Seleccionar</button></td>
      </tr>
    </tbody>
  </table>
