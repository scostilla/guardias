<div class="container-mt-3">
    <div class="row">
        <div class="col-md-4 mx-auto-4">
            <form (ngSubmit)="onCreate()" novalidate #f="ngForm">
                <div class="form-group">
                    <label for="codigo">Código</label>
                    <input type="text" class="form-control" id="codigo" name="codigo" [(ngModel)]="codigo" required>
                </div>
                <div class="form-group">
                    <label for="nacionalidad">Nacionalidad</label>
                    <input type="text" class="form-control" id="nacionalidad" name="nacionalidad" [(ngModel)]="nacionalidad" required>
                </div>
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" [(ngModel)]="nombre" required>
                </div>
                <button class="btn btn-outline-success btn-block" [disabled]="!f.valid">Agregar</button>
            </form>
        </div>
    </div>

</div>
