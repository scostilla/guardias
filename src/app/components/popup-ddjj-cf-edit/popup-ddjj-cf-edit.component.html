<div mat-dialog-title class="backgroud">
  <h1 class="font">MODIFICAR FACTURA</h1>
</div>
<div mat-dialog-content class="content">
  <div class="row mt-3">
      <p>Para: {{apellido}} {{nombre}}</p>
      <p>CUIL: {{cuil}}</p>
  </div>
  <mat-form-field appearance="outline">
    <mat-label>Contribuyente</mat-label>
    <mat-select [(ngModel)]="compContribuyente">
      <mat-option value="0">Monotributista</mat-option>
      <mat-option value="1">Responsable inscripto</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
      <mat-label>N° Factura</mat-label>
      <input matInput value="{{compFactura}}">
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Fecha</mat-label>
    <input matInput [matDatepicker]="picker1" [(ngModel)]="compFecha">
    <mat-hint>MM/DD/YYYY</mat-hint>
    <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
    <mat-datepicker #picker1></mat-datepicker>
  </mat-form-field>

  <mat-form-field appearance="outline">
      <mat-label>Monto</mat-label>
      <input matInput type="number" value="{{cfTotalLiq}}">
  </mat-form-field>
  <span [ngSwitch]="alert">
      <span *ngSwitchCase="[79990].includes(alert) ? alert : !alert">
      <div class="alert alert-danger" role="alert">
      El monto ingresado no coincide con el informado.
      </div>
      </span>
  </span>

</div>
<div mat-dialog-actions class="action">
  <button mat-raised-button class="btnupdate" type="button"
      [mat-dialog-close]="false">Cancelar</button>
  <button mat-raised-button class="btnupdate" color="primary" type="submit">Modificar</button>
</div>
